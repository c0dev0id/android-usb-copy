name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled]

jobs:
  build-sign:
    if: github.event_name == 'push' || github.event.label.name == 'run-build'
    uses: ./.github/workflows/_build-sign.yml
    secrets: inherit

  pre-release:
    needs: build-sign
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Rename APK
        run: mv app-release.apk usbcopy-dev.apk

      - name: Update dev tag
        run: |
          git tag -f dev
          git push origin dev --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          generate_release_notes: false
          files: usbcopy-dev.apk
