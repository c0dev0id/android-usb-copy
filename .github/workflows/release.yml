name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Release version (e.g., v1.2.3). Leave empty to auto-increment
          the patch version from the latest git tag.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            if [[ "$INPUT_VERSION" != v* ]]; then
              INPUT_VERSION="v${INPUT_VERSION}"
            fi
            VERSION="$INPUT_VERSION"
          else
            LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -n 1)

            if [ -z "$LATEST_TAG" ]; then
              VERSION="v0.0.1"
            else
              VERSION_BODY="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_BODY"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-sign:
    needs: version
    uses: ./.github/workflows/_build-sign.yml
    secrets: inherit

  release:
    needs: [version, build-sign]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Rename APK
        id: rename
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          DEST="usbcopy-${VERSION}.apk"
          mv app-release.apk "$DEST"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: ${{ steps.rename.outputs.apk_path }}
